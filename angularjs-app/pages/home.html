<div class="row">
    <div class="col-md-12 col-md-offset-3">
        <h4>Forecast By City</h4>
        <div ng-if="error" class="alert alert-danger" role="alert">
            {{error}}
        </div>
        <form ng-submit="submit()">
            <div class="form-group">
                <input type="text"
                       ng-model="city"
                       class="form-control"
                       placeholder="Enter city name"
                       required
                       minlength="2"
                       maxlength="100">
            </div>
            <input type="submit" class="btn btn-dark" value="Get Forecast">
        </form>
    </div>
</div>
