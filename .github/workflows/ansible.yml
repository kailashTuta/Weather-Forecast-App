# ─────────────────────────────────────────────────────────────────────────────
# This workflow has been refactored into a reusable workflow.
# The logic now lives in .github/workflows/_ansible.yml and is called
# by the main CI/CD pipeline in .github/workflows/ci.yml.
#
# This file is kept only as a manual escape-hatch so that the Ansible
# playbook can still be triggered in isolation via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────
name: Ansible (standalone)

on:
  workflow_dispatch:

jobs:
  ansible:
    name: "Run Ansible Playbook"
    uses: ./.github/workflows/_ansible.yml
