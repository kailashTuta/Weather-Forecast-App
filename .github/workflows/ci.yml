name: Weather Forecast App — CI/CD

on:
  push:
    branches: ["bob"]
  pull_request:
    branches: ["bob"]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  APP_PORT: 3000

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Build & unit-test the React application
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-react-app:
    name: "Build React App"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run React unit tests
        env:
          CI: true
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        env:
          CI: false   # treat warnings as warnings, not errors
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: react-app/build/
          retention-days: 3

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build and validate the Robot Framework test-automation project
# ─────────────────────────────────────────────────────────────────────────────
  build-test-automation:
    name: "Build Test Automation Framework"
    runs-on: ubuntu-latest
    needs: build-react-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Install Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Validate Robot Framework resource files (dry-run)
        env:
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
        # --dryrun parses all suites without executing any keyword
        run: |
          python -m robot \
            --dryrun \
            --nostatusrc \
            --pythonpath libraries \
            --outputdir reports/dryrun \
            --include smoke \
            --include regression \
            --include negative \
            tests/

      - name: Validate Robot Framework API tests (dry-run)
        env:
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
        run: |
          python -m robot \
            --dryrun \
            --nostatusrc \
            --pythonpath libraries \
            --outputdir reports/dryrun-api \
            tests/api/

      - name: Upload dry-run reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-reports
          path: reports/
          retention-days: 3

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Execute test cases against a live app running on the runner
# ─────────────────────────────────────────────────────────────────────────────
  execute-tests:
    name: "Execute Test Cases — ${{ matrix.suite.name }}"
    runs-on: ubuntu-latest
    needs: [build-react-app, build-test-automation]

    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: "API Tests"
            tag: "api"
            dir: "tests/api"
            browser_required: false
          - name: "Smoke Tests"
            tag: "smoke"
            dir: "tests/smoke"
            browser_required: true
          - name: "Regression Tests"
            tag: "regression"
            dir: "tests/regression"
            browser_required: true
          - name: "Negative Tests"
            tag: "negative"
            dir: "tests/negative"
            browser_required: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download the pre-built React bundle ──────────────────────────────────
      - name: Download React build artefact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: react-app/build/

      # ── Start the React app (browser suites only) ────────────────────────────
      # serve handles SPA fallback via -s (single-page mode), so React Router
      # client-side routes (/, /forecast, unknown) all resolve correctly.
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        if: matrix.suite.browser_required
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install serve
        if: matrix.suite.browser_required
        run: npm install -g serve

      # Run serve as a detached background service using nohup so it outlives
      # this step. The subsequent health-check step waits until port 3000 accepts
      # connections before any test step runs.
      - name: Start React app (background)
        if: matrix.suite.browser_required
        run: |
          nohup serve -s react-app/build -l ${{ env.APP_PORT }} \
            > /tmp/serve.log 2>&1 &
          echo $! > /tmp/serve.pid
          echo "React app PID $(cat /tmp/serve.pid) — serving on port ${{ env.APP_PORT }}"

      - name: Wait for React app to be ready
        if: matrix.suite.browser_required
        run: |
          echo "Polling http://localhost:${{ env.APP_PORT }} …"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ env.APP_PORT }} > /dev/null 2>&1; then
              echo "✓ App is ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i — not ready yet, waiting 2 s …"
            sleep 2
          done
          echo "✗ App did not start within 60 s"
          cat /tmp/serve.log
          exit 1

      # ── Start virtual display (browser suites only) ──────────────────────────
      # Xvfb must be started and confirmed ready BEFORE Chrome launches.
      - name: Start Xvfb virtual display
        if: matrix.suite.browser_required
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          echo $! > /tmp/xvfb.pid
          # Wait until the display socket exists
          for i in $(seq 1 15); do
            [ -e /tmp/.X11-unix/X99 ] && echo "✓ Xvfb ready" && break
            sleep 1
          done

      # ── Python + Robot Framework ─────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── Chrome (browser suites only) ─────────────────────────────────────────
      - name: Install Chrome and ChromeDriver
        if: matrix.suite.browser_required
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── Execute tests ────────────────────────────────────────────────────────
      - name: Run ${{ matrix.suite.name }}
        env:
          REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}
          DISPLAY: ":99"
        run: |
          python -m robot \
            --outputdir  reports/${{ matrix.suite.tag }} \
            --log        log_${{ matrix.suite.tag }}.html \
            --report     report_${{ matrix.suite.tag }}.html \
            --output     output_${{ matrix.suite.tag }}.xml \
            --include    ${{ matrix.suite.tag }} \
            --variable   BROWSER:headlesschrome \
            --pythonpath libraries \
            ${{ matrix.suite.dir }}/

      # ── Publish results (always, even on test failure) ────────────────────────
      - name: Upload test reports — ${{ matrix.suite.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report-${{ matrix.suite.tag }}
          path: reports/${{ matrix.suite.tag }}/
          retention-days: 14

      # ── Cleanup ──────────────────────────────────────────────────────────────
      - name: Stop background processes
        if: always() && matrix.suite.browser_required
        run: |
          [ -f /tmp/serve.pid ] && kill $(cat /tmp/serve.pid) 2>/dev/null || true
          [ -f /tmp/xvfb.pid  ] && kill $(cat /tmp/xvfb.pid)  2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 — Merge all Robot output XMLs into a single combined report
# ─────────────────────────────────────────────────────────────────────────────
  publish-combined-report:
    name: "Publish Combined Test Report"
    runs-on: ubuntu-latest
    needs: execute-tests
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Robot Framework
        run: pip install robotframework

      - name: Download all Robot report artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: robot-report-*
          path: reports/all/
          merge-multiple: false

      - name: Merge output XMLs with rebot
        run: |
          python -m robot.rebot \
            --outputdir reports/combined \
            --log     combined_log.html \
            --report  combined_report.html \
            --output  combined_output.xml \
            --merge \
            reports/all/robot-report-*/output_*.xml 2>/dev/null || true

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: robot-combined-report
          path: reports/combined/
          retention-days: 30
