# ─────────────────────────────────────────────────────────────────────────────
# Main CI/CD orchestrator — Weather Forecast App
#
# Triggers only on pushes to the main branch (or manual dispatch).
# Calls four reusable child workflows in the correct order:
#
#   1. test     — build React + validate & run Robot Framework tests
#   2. docker   — build Dockerfile + push to Docker Hub         (needs: test)
#   3. terraform— infrastructure provisioning                   (needs: docker)
#   4. ansible  — pull new image + restart container on EC2     (needs: terraform)
# ─────────────────────────────────────────────────────────────────────────────
name: Weather Forecast App — CI/CD

on:
  push:
    branches:
      - bob
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Test
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: "Test"
    uses: ./.github/workflows/_test.yml
    secrets:
      REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build & push Docker image
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: "Docker"
    needs: test
    uses: ./.github/workflows/_docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      REACT_APP_WEATHER_API_KEY: ${{ secrets.REACT_APP_WEATHER_API_KEY }}

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Terraform infrastructure
# ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: "Terraform"
    needs: docker
    uses: ./.github/workflows/_terraform.yml

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 — Ansible deployment
# ─────────────────────────────────────────────────────────────────────────────
  ansible:
    name: "Ansible"
    needs: terraform
    uses: ./.github/workflows/_ansible.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
