# ─────────────────────────────────────────────────────────────────────────────
# This workflow has been refactored into a reusable workflow.
# The logic now lives in .github/workflows/_terraform.yml and is called
# by the main CI/CD pipeline in .github/workflows/ci.yml.
#
# This file is kept only as a manual escape-hatch so that Terraform can
# still be triggered in isolation via workflow_dispatch when needed.
# ─────────────────────────────────────────────────────────────────────────────
name: Terraform IaC (standalone)

on:
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Init, Plan & Apply"
    uses: ./.github/workflows/_terraform.yml
