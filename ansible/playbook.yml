---
- hosts: aws_ec2
  become: yes
  connection: ssh
  user: ec2-user

  vars:
    ansible_ssh_private_key_file: "/etc/ansible/Docker-RSA.pem"
    ansible_ssh_user: "ec2-user"

  tasks:
    # ── Git ────────────────────────────────────────────────────────────────────
    - name: Install Git
      dnf:
        name: git
        state: present

    # ── Docker ─────────────────────────────────────────────────────────────────
    - name: Remove old Docker CE repo if present
      file:
        path: /etc/yum.repos.d/docker-ce.repo
        state: absent

    - name: Add Docker CE repository for Amazon Linux 2023
      shell: |
        dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
        sed -i 's/$releasever/9/g' /etc/yum.repos.d/docker-ce.repo
      args:
        executable: /bin/bash

    - name: Install Docker CE
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        disable_gpg_check: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
