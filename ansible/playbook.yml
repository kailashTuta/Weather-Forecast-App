---
- hosts: aws_ec2
  become: yes
  connection: ssh
  user: ec2-user

  vars:
    ansible_ssh_private_key_file: "/etc/ansible/Docker-RSA.pem"
    ansible_ssh_user: "ec2-user"

  tasks:
    # ── Git ────────────────────────────────────────────────────────────────────
    - name: Install Git
      dnf:
        name: git
        state: present

    # ── Docker ─────────────────────────────────────────────────────────────────
    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Enable and start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    # ── App Image ──────────────────────────────────────────────────────────────
    - name: Pull weather-forecast-app Docker image
      community.docker.docker_image:
        name: kailashtuta/weather-forecast-app
        tag: v2
        source: pull
        force_source: yes

    - name: Run weather-forecast-app container
      community.docker.docker_container:
        name: weather-forecast-app
        image: kailashtuta/weather-forecast-app:v2
        state: started
        restart_policy: always
        ports:
          - "80:3000"
