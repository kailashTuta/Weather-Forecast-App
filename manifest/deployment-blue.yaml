apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-forecast-app-blue
  labels:
    app: weather
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather
      version: blue
  template:
    metadata:
      labels:
        app: weather
        version: blue
    spec:
      containers:
        - name: weather-container
          image: kailashtuta/weather-forecast-app:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80